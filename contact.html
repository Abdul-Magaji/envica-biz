<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Envica: Build Smarter">
  <title>Envica | Contact</title>
  <link rel="icon" href="assets/favicon.png">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/services.css">
  <link rel="stylesheet" href="css/aboutus.css">
  <link rel="styLesheet" href="css/howwework.css">
  <link rel="styLesheet" href="css/approach.css">
  <link rel="styLesheet" href="contactpage.css">
  <link rel="styLesheet" href="css/testimonials.css">
  <link rel="stylesheet" href="css/footer.css">

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const toggleBtn = document.querySelector('.mobile-menu-toggle');
      const navLinks = document.querySelector('.nav-links');
  
      toggleBtn.addEventListener('click', function () {
        navLinks.classList.toggle('active');
        const expanded = toggleBtn.getAttribute('aria-expanded') === 'true';
        toggleBtn.setAttribute('aria-expanded', !expanded);
      });
    });
  </script>

  <div id="site-header"></div>

  <!-- Title -->
  <section class="page-title-card">
    <div class="title-overlay"></div>
    <div class="container">
      <h1>Contact Us</h1>
    </div>
    
  </section>

  <!-- Form -->
  <section class="contact-form-section">
    <div class="contact-container">
      <div class="contact-grid">
        <!-- Left Column - Form -->
        <div class="form-column">
          <li class="custom-li">Contact Us</li>
          <h2 class="section-title">Get in touch with us</h2>

          <form action="" class="contact-form">
            <div class="name-fields">
              <div class="form-group">
                <input type="text" id="firstName" required>
                <label for="firstName">First Name</label>
              </div>
              <div class="form-group">
                <input type="text" id="lastName" required>
                <label for="lastName">Last Name</label>
              </div>
            </div>

            <div class="form-group">
              <input type="tel" id="phone" required>
              <label for="phone">Enter your mobile no.</label>
            </div>
            
            <div class="form-group">
              <input type="email" id="email" required>
              <label for="email">Enter your e-mail</label>
            </div>
            
            <div class="form-group">
              <textarea id="message" rows="5" required></textarea>
              <label for="message">Write message...</label>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
          </form>
        </div>
        
        <!-- Right Column - Image -->
        <div class="image-column">
          <img src="img/about-img-2.webp" alt="Contact us" loading="lazy">
        </div>
      </div>
    </div>
  </section>

  <!-- Footer via loader -->
  <div id="site-footer"></div>

  <script src="js/loader.js" defer></script>
  <script src="main.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.landbot.io/landbot-3/landbot-3.0.0.js"></script>
  <script>
    var myLandbot = new Landbot.Livechat({
      configUrl: 'https://storage.googleapis.com/landbot.site/v3/H-3187191-UTJ2AQEPYEM78CHQ/index.json',
    });
  </script>
  <script>
    AOS.init({duration: 800, once: true});

    // Mobile menu toggle
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    menuToggle.addEventListener('click', () => {
      const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', !isExpanded);
      navLinks.style.display = isExpanded ? 'none' : 'flex';
    });
  </script>


</body>
</html>
